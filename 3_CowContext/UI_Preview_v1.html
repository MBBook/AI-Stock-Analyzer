<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stock Analyzer — UI Preview v1</title>
<style>
  :root{
    --bg:#0a0e17;
    --bg-2:#0d111c;
    --glass:rgba(255,255,255,0.045);
    --glass-strong:rgba(255,255,255,0.075);
    --border:rgba(255,255,255,0.09);
    --border-strong:rgba(255,255,255,0.18);
    --text:#f2f4fa;
    --text-2:rgba(242,244,250,0.62);
    --text-3:rgba(242,244,250,0.38);
    --purple:#8b7bf7;
    --purple-2:#6a5cf0;
    --blue:#4fc3ff;
    --gold-1:#f7ce85;
    --gold-2:#ef9f27;
    --green:#33d692;
    --red:#ff6570;
    --r-card:24px;
    --r-md:14px;
    --r-sm:9px;
    --r-pill:999px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  svg{width:16px;height:16px;flex-shrink:0;display:inline-block;vertical-align:middle;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 10% -10%, rgba(139,123,247,0.14), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(79,195,255,0.08), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter','Noto Sans Thai',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:8px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;}
  .num{font-variant-numeric:tabular-nums;}
  .preview-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 20px;background:rgba(255,255,255,0.03);border-bottom:1px dashed var(--border-strong);font-size:12px;color:var(--text-3);}
  .preview-bar b{color:var(--text-2);font-weight:600;}
  .toggle-wrap{display:flex;background:var(--glass);border:1px solid var(--border);border-radius:var(--r-pill);padding:3px;gap:2px;}
  .toggle-btn{padding:6px 14px;border-radius:var(--r-pill);font-size:12px;font-weight:600;color:var(--text-3);display:flex;align-items:center;gap:6px;transition:all .2s ease;}
  .toggle-btn.active{background:linear-gradient(135deg,var(--purple),var(--purple-2));color:#fff;box-shadow:0 4px 14px -4px rgba(139,123,247,0.6);}
  .toggle-btn svg{width:14px;height:14px;}
  #stage{padding:32px 16px 80px;display:flex;justify-content:center;}
  .desktop-shell{width:100%;max-width:1180px;}
  .mobile-shell{width:404px;}
  .mobile-frame{border:9px solid #050810;border-radius:46px;background:var(--bg);box-shadow:0 40px 90px -25px rgba(0,0,0,0.75), inset 0 0 0 1px rgba(255,255,255,0.04);height:840px;display:flex;flex-direction:column;overflow:hidden;position:relative;}
  .mobile-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:22px;background:#050810;border-radius:0 0 16px 16px;z-index:5;}
  .mobile-scroll{flex:1;overflow-y:auto;padding:26px 16px 14px;}
  .mobile-bottomnav{display:flex;border-top:1px solid var(--border);background:rgba(13,17,28,0.92);backdrop-filter:blur(14px);padding:9px 6px 12px;}
  .mobile-navitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:14px;color:var(--text-3);font-size:10.5px;font-weight:600;position:relative;transition:color .2s ease;}
  .mobile-navitem svg{width:20px;height:20px;}
  .mobile-navitem.active{color:var(--purple);}
  .mobile-navitem .navdot{position:absolute;top:2px;right:22%;background:linear-gradient(135deg,var(--gold-1),var(--gold-2));color:#3a2405;font-size:9px;font-weight:800;min-width:14px;height:14px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
  .mobile-eyebtn{position:absolute;top:14px;right:14px;z-index:6;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-2);}
  .mobile-eyebtn svg{width:15px;height:15px;}
  .mobile-eyebtn:active{transform:scale(0.9);}
  .desktop-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
  .brand{font-size:19px;font-weight:700;letter-spacing:-.2px;}
  .desktop-nav{display:flex;background:var(--glass);border:1px solid var(--border);border-radius:var(--r-pill);padding:5px;gap:2px;}
  .desktop-navitem{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-pill);font-size:13.5px;font-weight:600;color:var(--text-2);transition:all .2s ease;position:relative;}
  .desktop-navitem svg{width:16px;height:16px;}
  .desktop-navitem:hover{transform:translateY(-2px);color:var(--text);}
  .desktop-navitem.active{background:linear-gradient(135deg,var(--purple),var(--purple-2));color:#fff;box-shadow:0 6px 16px -6px rgba(139,123,247,0.55);}
  .desktop-navitem .navdot{position:absolute;top:-4px;right:-2px;background:linear-gradient(135deg,var(--gold-1),var(--gold-2));color:#3a2405;font-size:9.5px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
  .glass{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-card);backdrop-filter:blur(18px);}
  .press{transition:transform .12s ease;}
  .press:active{transform:scale(0.92);}
  .gold-btn{background:linear-gradient(135deg,var(--gold-1),var(--gold-2));color:#3a2405;font-weight:700;font-size:13px;padding:10px 18px;border-radius:var(--r-md);display:inline-flex;align-items:center;gap:6px;box-shadow:0 10px 22px -9px rgba(239,159,39,0.6), inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -3px 5px rgba(140,74,3,0.35);transition:transform .15s cubic-bezier(.34,1.56,.64,1);}
  .gold-btn:hover{transform:scale(1.06);}
  .gold-btn:active{transform:scale(.92);}
  .ghost-btn{background:var(--glass);border:1px solid var(--border);padding:9px 14px;border-radius:var(--r-md);font-size:12.5px;font-weight:600;color:var(--text-2);display:inline-flex;align-items:center;gap:6px;}
  .ghost-btn:hover{border-color:var(--border-strong);color:var(--text);}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);display:inline-block;letter-spacing:.2px;}
  .badge-buy{background:rgba(51,214,146,0.16);color:var(--green);}
  .badge-sell{background:rgba(255,101,112,0.16);color:var(--red);}
  .badge-hold{background:rgba(139,123,247,0.18);color:var(--purple);}
  .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;color:#fff;flex-shrink:0;}
  .up{color:var(--green);} .down{color:var(--red);}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
  .pillbar{position:relative;display:inline-flex;background:var(--glass);border:1px solid var(--border);border-radius:var(--r-pill);padding:4px;}
  .pillbar .highlight{position:absolute;top:4px;bottom:4px;border-radius:var(--r-pill);background:linear-gradient(135deg,var(--purple),var(--purple-2));transition:transform .28s cubic-bezier(.34,1.2,.4,1), width .28s cubic-bezier(.34,1.2,.4,1);box-shadow:0 4px 14px -4px rgba(139,123,247,0.6);}
  .pillbar button{position:relative;z-index:1;padding:7px 15px;font-size:12px;font-weight:600;color:var(--text-3);border-radius:var(--r-pill);transition:color .2s ease;white-space:nowrap;min-width:88px;display:inline-flex;align-items:center;justify-content:center;}
  .pillbar button.active{color:#fff;}
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0;}
  .portfolio-hero{display:grid;grid-template-columns:2.3fr 1fr;gap:16px;align-items:stretch;}
  .portfolio-hero .kpi-card{flex:1;display:flex;flex-direction:column;justify-content:center;}
  .kpi-card{padding:16px 18px;}
  .kpi-label{font-size:11.5px;color:var(--text-3);font-weight:600;margin-bottom:8px;}
  .kpi-thb{font-size:22px;font-weight:700;}
  .kpi-usd{font-size:12px;color:var(--text-3);margin-top:2px;}
  .kpi-change{margin-top:8px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);display:inline-block;}
  .dtable-wrap{padding:6px;}
  table.dtable{width:100%;border-collapse:collapse;font-size:13px;}
  table.dtable thead th{text-align:left;font-size:11px;font-weight:700;color:var(--text-3);text-transform:none;padding:12px 14px;background:rgba(255,255,255,0.035);letter-spacing:.3px;}
  table.dtable thead th:first-child{border-radius:14px 0 0 14px;}
  table.dtable thead th:last-child{border-radius:0 14px 14px 0;}
  table.dtable thead th.num, table.dtable td.num{text-align:right;}
  table.dtable tbody tr{border-bottom:1px solid rgba(255,255,255,0.05);transition:background .15s ease;}
  table.dtable tbody tr:nth-child(odd){background:rgba(255,255,255,0.015);}
  table.dtable tbody tr:hover{background:rgba(255,255,255,0.05);}
  table.dtable td{padding:11px 14px;height:44px;vertical-align:middle;}
  .row-click{cursor:pointer;}
  .cell-asset{display:flex;align-items:center;gap:10px;}
  .cell-sub{font-size:11px;color:var(--text-3);margin-top:1px;}
  .cell-name{font-weight:700;font-size:13px;}
  .mcard{padding:14px;margin-bottom:10px;}
  .mcard-top{display:flex;align-items:center;gap:10px;}
  .mcard-mid{margin-top:10px;display:flex;justify-content:space-between;align-items:baseline;}
  .mcard-bottom{margin-top:6px;display:flex;justify-content:space-between;align-items:center;}
  .sec-head{display:flex;justify-content:space-between;align-items:center;margin:22px 0 10px;flex-wrap:wrap;gap:10px;}
  .sec-title{font-size:15px;font-weight:700;}
  .sec-sub{font-size:11.5px;color:var(--text-3);margin-top:2px;}
  .page-title{font-size:24px;font-weight:700;letter-spacing:-.3px;}
  .page-sub{font-size:12.5px;color:var(--text-3);margin-top:4px;}
  .chart-card{padding:18px;min-height:300px;position:relative;}
  .chart-body svg{width:100%;height:100%;display:block;}
  .chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
  .line-draw{stroke-dasharray:1000;stroke-dashoffset:1000;animation:drawline 1.3s cubic-bezier(.3,.8,.4,1) forwards;}
  @keyframes drawline{to{stroke-dashoffset:0;}}
  .bar-rise{animation:barrise .6s cubic-bezier(.2,.9,.3,1.1) backwards;}
  @keyframes barrise{from{transform:scaleY(0);opacity:0;}to{transform:scaleY(1);opacity:1;}}
  .news-card{padding:15px 16px;margin-bottom:11px;transition:opacity .2s ease, background .2s ease;position:relative;}
  .news-card.unread{border-left:3px solid var(--gold-2);}
  .news-card.read{opacity:.62;}
  .news-card.read .news-headline{font-weight:500;}
  .news-tags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .tag{font-size:10px;font-weight:700;background:rgba(255,255,255,0.07);color:var(--text-2);padding:2px 8px;border-radius:6px;}
  .sent{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:var(--r-pill);}
  .sent-pos{background:rgba(51,214,146,0.16);color:var(--green);}
  .sent-neg{background:rgba(255,101,112,0.16);color:var(--red);}
  .sent-neu{background:rgba(255,255,255,0.08);color:var(--text-2);}
  .news-headline{font-weight:700;font-size:14px;line-height:1.45;margin-bottom:5px;}
  .news-snippet{font-size:12px;color:var(--text-2);line-height:1.55;margin-bottom:10px;}
  .news-foot{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3);}
  .newdot{display:inline-flex;align-items:center;gap:5px;color:var(--gold-2);font-weight:800;}
  .newdot .dot{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--gold-1),var(--gold-2));}
  .newdot.pulseonce .dot{animation:pulseonce 1.1s ease-out 2;}
  @keyframes pulseonce{0%{box-shadow:0 0 0 0 rgba(239,159,39,0.55);}70%{box-shadow:0 0 0 7px rgba(239,159,39,0);}100%{box-shadow:0 0 0 0 rgba(239,159,39,0);}}
  .paginate{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:11.5px;color:var(--text-3);flex-wrap:wrap;gap:10px;}
  .pgnums{display:flex;gap:6px;align-items:center;}
  .pgcircle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid var(--border);color:var(--text-2);}
  .pgcircle.active{background:linear-gradient(135deg,var(--purple),var(--purple-2));border:none;color:#fff;}
  .pgarrow{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--text-2);}
  .pgarrow svg{width:13px;height:13px;}
  .glass-modal{background:linear-gradient(180deg, rgba(23,27,42,0.97), rgba(12,15,24,0.98));border:1px solid rgba(255,255,255,0.14);border-radius:var(--r-card);backdrop-filter:blur(26px);box-shadow:0 32px 70px -22px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.05);}
  #overlay{position:fixed;inset:0;background:rgba(3,4,9,0.76);backdrop-filter:blur(7px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  #overlay.show{display:flex;}
  #modal{width:100%;max-width:440px;max-height:86vh;overflow-y:auto;padding:22px;transform:scale(.86);opacity:0;transition:transform .32s cubic-bezier(.34,1.56,.64,1), opacity .22s ease, max-width .25s ease;}
  #modal.modal-wide{max-width:640px;padding:30px;}
  #overlay.show #modal{transform:scale(1);opacity:1;}
  .modal-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12.5px;}
  .modal-row .l{color:var(--text-3);}
  .modal-row .r{font-weight:700;}
  .insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
  .insight-item{background:rgba(255,255,255,0.03);border-radius:12px;padding:10px 12px;}
  .insight-item .l{font-size:10.5px;color:var(--text-3);margin-bottom:3px;}
  .insight-item .v{font-size:13px;font-weight:700;}
  .conf-track{height:8px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:8px;}
  .conf-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--purple-2),var(--purple),var(--blue));}
  .danger-btn{width:100%;margin-top:16px;padding:12px;border-radius:var(--r-md);background:rgba(255,101,112,0.12);color:var(--red);font-weight:700;font-size:13px;border:1px solid rgba(255,101,112,0.3);}
  .danger-btn:hover{background:rgba(255,101,112,0.18);}
  #confirmOverlay{position:fixed;inset:0;background:rgba(3,4,9,0.82);backdrop-filter:blur(7px);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
  #confirmOverlay.show{display:flex;}
  #confirmBox{width:100%;max-width:320px;padding:22px;text-align:center;transform:scale(.9);opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);}
  #confirmOverlay.show #confirmBox{transform:scale(1);opacity:1;}
  #toast{position:fixed;bottom:26px;left:50%;transform:translate(-50%,20px);opacity:0;transition:all .3s cubic-bezier(.3,.9,.3,1.2);background:rgba(20,24,36,0.95);border:1px solid var(--border-strong);padding:12px 20px;border-radius:var(--r-pill);font-size:12.5px;font-weight:600;z-index:300;display:flex;align-items:center;gap:8px;box-shadow:0 14px 30px -10px rgba(0,0,0,0.5);}
  #toast.show{transform:translate(-50%,0);opacity:1;}
  .sys-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:stretch;}
  .sys-grid .winrate-card{flex:1;display:flex;flex-direction:column;justify-content:center;margin-bottom:0;}
  .winrate-card{padding:16px;margin-bottom:14px;}
  .winrate-track{position:relative;height:10px;border-radius:99px;background:rgba(255,255,255,0.08);margin:10px 0 8px;overflow:visible;}
  .winrate-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--purple-2),var(--purple));}
  .winrate-target{position:absolute;top:-4px;width:2px;height:18px;background:var(--gold-2);}
  .skeleton{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 37%,rgba(255,255,255,0.04) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:12px;}
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;} }
</style>
</head>
<body>

<div class="preview-bar">
  <span>Preview build — toggle นี้มีไว้ตรวจสอบ Desktop/Mobile คู่กันเท่านั้น ไม่ใช่ฟีเจอร์จริงในแอป</span>
  <div class="toggle-wrap" id="viewToggle">
    <button class="toggle-btn active press" data-mode="desktop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Desktop
    </button>
    <button class="toggle-btn press" data-mode="mobile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>
      Mobile
    </button>
  </div>
</div>

<div id="stage"></div>

<div id="overlay"><div id="modal" class="glass-modal"></div></div>
<div id="confirmOverlay"><div id="confirmBox" class="glass-modal"></div></div>
<div id="toast"></div>

<script>
var ICONS = {
  wallet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>',
  trending: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>',
  news: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6Z"/></svg>',
  system: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>',
  search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  filter: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>',
  sort: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 16 4 4 4-4M7 20V4M21 8l-4-4-4 4M17 4v16"/></svg>',
  chevdown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  arrowleft: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',

function countUp(el, to, prefix, decimals){
  var dur=900, start=performance.now(), from=0;
  function step(now){
    var p = Math.min(1,(now-start)/dur);
    var eased = 1-Math.pow(1-p,3);
    var val = from + (to-from)*eased;
    el.textContent = prefix + (decimals ? val.toFixed(decimals) : fmt(val));
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function barChartSVG(data, unit){
  var W=560,H=190,pad=28;
  var max = Math.max.apply(null, data.map(function(d){ return (typeof d==='object')?d.v:d; }));
  var step = (W-pad*2)/data.length;
  var bars='', labels='', dashline=[];
  data.forEach(function(d,i){
    var v = (typeof d==='object')?d.v:d;
    var label = (typeof d==='object')?d.label:('D'+(i+1));
    var h = (v/max)*(H-60);
    var x = pad + i*step + step*0.22;
    var bw = step*0.56;
    var y = H-40-h;
    dashline.push([x+bw/2, y]);
    bars += '<rect class="bar-rise" style="animation-delay:'+(i*70)+'ms;transform-origin:'+(x+bw/2)+'px '+(H-40)+'px" x="'+x+'" y="'+y+'" width="'+bw+'" height="'+h+'" rx="7" fill="url(#barGrad)"/>';
    bars += '<text x="'+(x+bw/2)+'" y="'+(y-8)+'" text-anchor="middle" font-size="10.5" fill="rgba(242,244,250,0.7)" font-weight="700">'+(unit==='thb'?fmt(v)+'K':'$'+v.toFixed(2))+'</text>';
    labels += '<text x="'+(x+bw/2)+'" y="'+(H-20)+'" text-anchor="middle" font-size="9.5" fill="rgba(242,244,250,0.35)">'+label+'</text>';
  });
  var dashed = dashline.map(function(p,i){ return (i===0?'M':'L')+p[0]+' '+p[1]; }).join(' ');
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="100%">' +
    '<defs><linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">' +
    '<stop offset="0%" stop-color="#6a5cf0"/><stop offset="100%" stop-color="#8b7bf7"/></linearGradient></defs>' +
    '<path d="'+dashed+'" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.4" stroke-dasharray="3 4"/>' +
    bars + labels + '</svg>';
}

function lineChartSVG(data, unit){
  var W=560,H=190,pad=26;
  var max = Math.max.apply(null, data)*1.15 || 1;
  var min = Math.min(0, Math.min.apply(null, data));
  var step = (W-pad*2)/(data.length-1);
  function scaleY(v){ return (H-46) - ((v-min)/(max-min))*(H-70); }
  var path = data.map(function(v,i){ return (i===0?'M':'L')+(pad+i*step)+' '+scaleY(v); }).join(' ');
  var areaPath = path + ' L '+(pad+(data.length-1)*step)+' '+(H-40)+' L '+pad+' '+(H-40)+' Z';
  var lastX = pad+(data.length-1)*step, lastY = scaleY(data[data.length-1]);
  var lastVal = unit==='usd' ? ('$'+data[data.length-1].toFixed(2)) : ('+'+data[data.length-1].toFixed(1)+'%');
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="100%">' +
    '<defs><linearGradient id="lineFill" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0%" stop-color="rgba(139,123,247,0.35)"/><stop offset="100%" stop-color="rgba(139,123,247,0)"/></linearGradient>' +
    '<radialGradient id="goldDot"><stop offset="0%" stop-color="#f7ce85"/><stop offset="100%" stop-color="#ef9f27"/></radialGradient></defs>' +
    '<path d="'+areaPath+'" fill="url(#lineFill)"/>' +
    '<path class="line-draw" d="'+path+'" fill="none" stroke="#8b7bf7" stroke-width="2.6" stroke-linecap="round"/>' +
    '<circle cx="'+lastX+'" cy="'+lastY+'" r="5.5" fill="url(#goldDot)"/>' +
    '<text x="'+(lastX-8)+'" y="'+(lastY-14)+'" text-anchor="end" font-size="12.5" font-weight="800" fill="#f7ce85">'+lastVal+'</text>' +
    '</svg>';
}

// diverging % bar chart — bars ขึ้น/ลงจากเส้น 0 กลาง ใช้กับ Monthly/Yearly returns (มีทั้งบวก/ลบ)
function pctBarChartSVG(data){
  var W=560,H=190,pad=28;
  var maxAbs = Math.max.apply(null, data.map(function(d){ return Math.abs(d.v); })) || 1;
  maxAbs = maxAbs*1.2;
  var zeroY = H/2;
  var halfH = H/2-34;
  var step = (W-pad*2)/data.length;
  var bars='', labels='';
  data.forEach(function(d,i){
    var h = (Math.abs(d.v)/maxAbs)*halfH;
    var x = pad + i*step + step*0.22;
    var bw = step*0.56;
    var isUp = d.v>=0;
    var y = isUp ? (zeroY-h) : zeroY;
    var color = isUp ? 'url(#barGrad)' : '#ef5b6b';
    bars += '<rect class="bar-rise" style="animation-delay:'+(i*70)+'ms;transform-origin:'+(x+bw/2)+'px '+zeroY+'px" x="'+x+'" y="'+y+'" width="'+bw+'" height="'+Math.max(h,2)+'" rx="6" fill="'+color+'"/>';
    var labelY = isUp ? (y-8) : (y+h+16);
    bars += '<text x="'+(x+bw/2)+'" y="'+labelY+'" text-anchor="middle" font-size="10.5" fill="rgba(242,244,250,0.7)" font-weight="700">'+(isUp?'+':'')+d.v.toFixed(1)+'%</text>';
    labels += '<text x="'+(x+bw/2)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9.5" fill="rgba(242,244,250,0.35)">'+d.label+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="100%">' +
    '<defs><linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">' +
    '<stop offset="0%" stop-color="#6a5cf0"/><stop offset="100%" stop-color="#8b7bf7"/></linearGradient></defs>' +
    '<line x1="'+pad+'" y1="'+zeroY+'" x2="'+(W-pad)+'" y2="'+zeroY+'" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>' +
    bars + labels + '</svg>';
}

function wirePillbar(root, onchange){
  var bar = root.querySelector('.pillbar');
  var btns = Array.prototype.slice.call(bar.querySelectorAll('button'));
  var hl = bar.querySelector('.highlight');
  function place(i){
    var b = btns[i];
    hl.style.width = b.offsetWidth+'px';
    hl.style.transform = 'translateX('+b.offsetLeft+'px)';
  }
  btns.forEach(function(b,i){
    b.addEventListener('click', function(){
      btns.forEach(function(x){ x.classList.remove('active'); });
      b.classList.add('active');
      place(i);
      onchange(b.dataset.val);
    });
  });
  var activeIdx = -1;
  btns.forEach(function(b,i){ if(b.classList.contains('active')) activeIdx = i; });
  requestAnimationFrame(function(){ place(activeIdx<0?0:activeIdx); });
}

  html += '<div style="margin-top:12px;font-size:12px;color:var(--text-2);line-height:1.6"><b class="cell-sub">เกี่ยวกับบริษัทนี้</b><div style="margin-top:4px">'+(t.name||'')+' ดำเนินธุรกิจในกลุ่มเทคโนโลยี/พลังงานที่เกี่ยวข้องกับแนวโน้มการเติบโตของ AI และโครงสร้างพื้นฐานดิจิทัล</div></div>';
  if(showDeleteBtn){
    html += '<button class="danger-btn press" id="deleteStockBtn" data-ticker="'+t.ticker+'">ลบหุ้นออกจากรายการติดตาม</button>';
  }

  var modalEl = document.getElementById('modal');
  modalEl.classList.remove('modal-wide');
  modalEl.innerHTML = html;
  document.getElementById('overlay').classList.add('show');

  var delBtn = document.getElementById('deleteStockBtn');
  if(delBtn) delBtn.addEventListener('click', function(e){ openConfirm(e.currentTarget.dataset.ticker); });
}
function closePopup(){ document.getElementById('overlay').classList.remove('show'); }

function openConfirm(ticker){
  var box = document.getElementById('confirmBox');
  box.innerHTML = '<div style="color:var(--red);margin-bottom:10px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4M12 17h.01"/></svg></div>' +
    '<div style="font-weight:700;font-size:15px;margin-bottom:6px">แน่ใจหรือไม่ว่าต้องการลบ '+ticker+'?</div>' +
    '<div class="cell-sub" style="margin-bottom:16px">การลบจะเอาหุ้นนี้ออกจากรายการติดตาม จะไม่สามารถย้อนกลับได้</div>' +
    '<div style="display:flex;gap:8px"><button class="ghost-btn press" style="flex:1;justify-content:center" id="cancelDel">ยกเลิก</button>' +
    '<button class="danger-btn press" style="margin-top:0;flex:1" id="confirmDel">ลบเลย</button></div>';
  document.getElementById('confirmOverlay').classList.add('show');
  document.getElementById('cancelDel').onclick = function(){ document.getElementById('confirmOverlay').classList.remove('show'); };
  document.getElementById('confirmDel').onclick = function(){
    document.getElementById('confirmOverlay').classList.remove('show');
    closePopup();
    toast('ลบ '+ticker+' ออกจากรายการแล้ว');
  };
}

function openNewsPopup(n){
  var html = '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px"><div class="news-tags" style="margin-bottom:0">'+n.tickers.map(function(t){return '<span class="tag">'+t+'</span>';}).join('')+'</div>'+sentBadge(n.sentiment)+'</div>';
  html += '<div style="font-size:20px;font-weight:800;line-height:1.5;margin-bottom:14px">'+n.headline+'</div>';
  html += '<div style="margin-bottom:16px"><span class="badge" style="background:rgba(255,255,255,0.08);color:var(--text-2);font-size:12px;padding:5px 12px">Impact: '+n.impact+'</span></div>';
  html += '<div style="font-size:15px;color:var(--text);line-height:1.9">'+n.body+'</div>';
  html += '<div class="cell-sub" style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.08);padding-top:14px;font-size:12.5px">'+timeAgoLabel(n.ts)+' · '+n.source+'</div>';
  var modalEl = document.getElementById('modal');
  modalEl.classList.add('modal-wide');
  modalEl.innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}

function renderStage(){
  var stage = document.getElementById('stage');
  var mobile = state.mode==='mobile';
  var content;
  if(state.tab==='portfolio') content = renderPortfolio(mobile);
  else if(state.tab==='tickers') content = renderTickers(mobile);
  else if(state.tab==='news') content = renderNews(mobile);
  else content = renderSystem(mobile);

  if(mobile){
    stage.innerHTML = '<div class="mobile-shell"><div class="mobile-frame"><div class="mobile-notch"></div>' +
      '<button class="mobile-eyebtn press" id="eyeToggleBtnMobile" title="ซ่อน/แสดงตัวเลขเงิน" aria-label="ซ่อนตัวเลขเงิน">'+(state.hideAmounts?ICONS.eyeOff:ICONS.eye)+'</button>' +
      '<div class="mobile-scroll">'+content+'</div>' +
      '<div class="mobile-bottomnav">'+renderNavMobile()+'</div>' +
    '</div></div>';
  } else {
    stage.innerHTML = '<div class="desktop-shell">'+renderNavDesktop()+content+'</div>';
  }
  wireEvents();
}

function wireEvents(){
  var tabBtns = document.querySelectorAll('[data-tab]');
  for(var a=0;a<tabBtns.length;a++){
    tabBtns[a].addEventListener('click', function(e){ state.tab=e.currentTarget.dataset.tab; state.newsPage=1; renderStage(); });
  }
  var rowEls = document.querySelectorAll('.row-click');
  for(var b=0;b<rowEls.length;b++){
    rowEls[b].addEventListener('click', function(e){ openStockPopup(e.currentTarget.dataset.ticker, e.currentTarget.dataset.context); });
  }
  var numEls = document.querySelectorAll('.num[data-cu]');
  for(var c=0;c<numEls.length;c++){
    if(state.hideAmounts){ numEls[c].textContent = '฿••••••'; }
    else { countUp(numEls[c], parseFloat(numEls[c].dataset.cu), '฿', 0); }
  }

  var eyeBtn = document.getElementById('eyeToggleBtn');
  if(eyeBtn) eyeBtn.addEventListener('click', function(){ state.hideAmounts = !state.hideAmounts; renderStage(); });
  var eyeBtnM = document.getElementById('eyeToggleBtnMobile');
  if(eyeBtnM) eyeBtnM.addEventListener('click', function(){ state.hideAmounts = !state.hideAmounts; renderStage(); });

  var periodPill = document.getElementById('periodPill');
  if(periodPill){
    var pbody = periodPill.closest('.chart-card').querySelector('.chart-body');
    pbody.innerHTML = pctBarChartSVG(MONTHLY_RETURNS);
    wirePillbar(document, function(val){
      if(val==='cum') pbody.innerHTML = lineChartSVG(CUMULATIVE,'pct');
      else if(val==='year') pbody.innerHTML = pctBarChartSVG(YEARLY_RETURNS);
      else pbody.innerHTML = pctBarChartSVG(MONTHLY_RETURNS);
    });
  }

  var costPill = document.getElementById('costPill');
  if(costPill){
    var cbody = document.getElementById('costChartBody');
    cbody.innerHTML = barChartSVG(COST_DATA,'usd');
    wirePillbar(document, function(val){
      if(val==='cum'){
        var running=0;
        var cum = COST_DATA.map(function(d){ running+=d.v; return running; });
        cbody.innerHTML = lineChartSVG(cum,'usd');
      } else if(val==='month'){
        cbody.innerHTML = barChartSVG(MONTHLY_COST,'usd');
      } else cbody.innerHTML = barChartSVG(COST_DATA,'usd');
    });
  }

  var markAll = document.getElementById('markAllRead');
  if(markAll) markAll.addEventListener('click', function(){ NEWS.forEach(function(n){n.read=true;}); toast('อ่านข่าวทั้งหมดแล้ว'); renderStage(); });

  var newsEls = document.querySelectorAll('[data-news]');
  for(var d=0;d<newsEls.length;d++){
    newsEls[d].addEventListener('click', function(e){
      var id = e.currentTarget.dataset.news;
      var n = null;
      NEWS.forEach(function(x){ if(String(x.id)===String(id)) n = x; });
      n.read = true;
      openNewsPopup(n);
      renderStage();
    });
  }

  var pgEls = document.querySelectorAll('.pgnum');
  for(var e2=0;e2<pgEls.length;e2++){
    pgEls[e2].addEventListener('click', function(e){ state.newsPage=parseInt(e.currentTarget.dataset.p); renderStage(); });
  }
  var prev = document.getElementById('pgPrev'), next=document.getElementById('pgNext');
  if(prev) prev.addEventListener('click', function(){ if(state.newsPage>1){state.newsPage--; renderStage();} });
  if(next) next.addEventListener('click', function(){ var total=Math.ceil(NEWS.length/PER_PAGE); if(state.newsPage<total){state.newsPage++; renderStage();} });
}

document.getElementById('overlay').addEventListener('click', function(e){ if(e.target.id==='overlay') closePopup(); });
document.getElementById('confirmOverlay').addEventListener('click', function(e){ if(e.target.id==='confirmOverlay') document.getElementById('confirmOverlay').classList.remove('show'); });
document.getElementById('viewToggle').addEventListener('click', function(e){
  var btn = e.target.closest('.toggle-btn');
  if(!btn) return;
  var allToggle = document.querySelectorAll('.toggle-btn');
  for(var i=0;i<allToggle.length;i++) allToggle[i].classList.remove('active');
  btn.classList.add('active');
  state.mode = btn.dataset.mode;
  renderStage();
});

renderStage();
</script>
</body>
</html>
