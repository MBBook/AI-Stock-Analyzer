name: AI_Stocks_Prefetch

# ✅ เปิด schedule กลับมาแล้ว 2026-07-02 (Defect #14) — APScheduler ที่ใช้แทนตั้งแต่ 2026-07-01
# หยุดยิงเงียบๆ นาน 22+ ชม. (รอบ 09:05-13:05 วันที่ 2 ก.ค. ขาดหมด) โดยไม่มี error ให้เห็นเลย
# เพราะเป็น in-process scheduler ผูกกับ process เดียว ตรวจสอบ/debug ยากกว่า GitHub Actions มาก
# ตัดสินใจสลับกลับมาใช้ GitHub Actions เป็นระบบหลักแทน (เห็น run history ชัดเจนใน GitHub UI)
# และปิด setup_scheduler() ใน main.py แล้ว กัน 2 ระบบซ้อนกันแบบเดียวกับ Defect #11
on:
  schedule:
    - cron: '5 2-14 * * 1-5'   # ทุกชั่วโมง นาที :05 ช่วง 02:00-14:00 UTC (09:00-21:00 Bangkok) จ-ศ
    - cron: '45 14 * * 1-5'    # pre-warm 14:45 UTC (21:45 Bangkok) จ-ศ ก่อน workflow หลัก 22:00
  workflow_dispatch:  # manual trigger สำหรับ test / debug

jobs:
  prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wake up Render server
        run: |
          echo "⏰ Waking up Render..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.RENDER_URL }}/health")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server is awake!"
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "❌ Server failed to wake — skipping prefetch"
              exit 0  # exit 0: ไม่ fail workflow ถ้า server ไม่ตื่น
            fi
            sleep 10
          done

      - name: POST /prefetch
        run: |
          echo "📡 Triggering price pre-fetch..."
          RESPONSE=$(curl -s -X POST "${{ secrets.RENDER_URL }}/prefetch" \
            -H "Content-Type: application/json" \
            --max-time 10)
          echo "Response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "parse_error")
          echo "Prefetch status: $STATUS"
          if [ "$STATUS" = "prefetch_started" ]; then
            echo "✅ Pre-fetch triggered successfully"
          else
            echo "⚠️ Unexpected response — check Render logs"
            exit 0  # exit 0: ไม่ fail workflow เพราะ prefetch เป็น optional
          fi
