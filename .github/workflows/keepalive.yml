name: Render Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'  # ทุก 10 นาที ทุกวัน
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping + self-heal trigger
        run: |
          # Step 1: Wake up Render
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.RENDER_URL }}/health" || echo "000")
          echo "Health: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Render not responding — skipping self-heal check"
            exit 0
          fi
          echo "✅ Render is alive"

          # Step 2: Self-heal — ถ้าเป็น weekday + UTC >= 15:00 และยังไม่มี run วันนี้ → trigger
          DAY=$(date +%u)    # 1=Mon ... 7=Sun
          HOUR=$(date +%H)   # UTC hour (GitHub Actions รัน UTC)
          TODAY=$(date +%Y-%m-%d)
          echo "Day=$DAY Hour=$HOUR UTC Today=$TODAY"

          if [ "$DAY" -le 5 ] && [ "$HOUR" -ge 15 ]; then
            # Check workflow status
            WF_STATUS=$(curl -s --max-time 10 "${{ secrets.RENDER_URL }}/workflow/status" || echo "")
            CURRENT=$(echo "$WF_STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            echo "Workflow status: $CURRENT"

            if [ "$CURRENT" = "running" ]; then
              echo "✅ Workflow already running — nothing to do"
              exit 0
            fi

            # Check if already ran today (UTC date)
            HISTORY=$(curl -s --max-time 10 "${{ secrets.RENDER_URL }}/workflow/history" || echo "")
            RAN_TODAY=$(echo "$HISTORY" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print('yes' if any(r.get('timestamp','').startswith('$TODAY') for r in d.get('runs',[])) else 'no')" 2>/dev/null || echo "unknown")
            echo "Ran today: $RAN_TODAY"

            if [ "$RAN_TODAY" = "no" ]; then
              echo "⚠️ No workflow run today yet — self-healing trigger!"
              if [ "$DAY" = "1" ]; then
                ENDPOINT="${{ secrets.RENDER_URL }}/workflow?include_weekend=true"
              else
                ENDPOINT="${{ secrets.RENDER_URL }}/workflow"
              fi
              RESPONSE=$(curl -s -X POST "$ENDPOINT" --max-time 60 || echo "")
              echo "Trigger response: $RESPONSE"
            else
              echo "✅ Workflow already ran today"
            fi
          else
            echo "ℹ️ Outside trigger window (weekday UTC>=15 required)"
          fi
          exit 0
