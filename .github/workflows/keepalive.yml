name: Render Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'  # ทุก 10 นาที ทุกวัน
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping + self-heal trigger
        run: |
          # Step 1: Wake up Render (retry 6x × 15s = รอ Render ตื่นได้สูงสุด ~90s)
          STATUS="000"
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.RENDER_URL }}/health" || echo "000")
            echo "Wake attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then break; fi
            if [ "$i" -lt 6 ]; then sleep 10; fi
          done
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Render not responding after retries — skipping self-heal check"
            exit 0
          fi
          echo "✅ Render is alive"

          # Step 2: Self-heal — ถ้าเป็น weekday + UTC >= 15:00 และ workflow ไม่ได้รันอยู่ → resume
          # ✅ แก้ 2026-07-01: เปลี่ยนจาก POST /workflow (วิเคราะห์ใหม่หมดทุกตัว) เป็น
          # POST /workflow/resume (วิเคราะห์เฉพาะหุ้นที่ยังไม่เสร็จวันนี้) — endpoint นี้เช็คเองอยู่แล้วว่า
          # วันนี้ COMPLETE/BUDGET_EXCEEDED/ABORTED หรือยัง (skip ถ้าจบแล้ว) และเช็ค Monday include_weekend เอง
          # เหตุผล: เดิมถ้า Render ล่ม/dyno sleep กลางคันแล้ว self-heal restart ใหม่ทั้งชุด
          # เสียเงินวิเคราะห์ซ้ำหุ้นที่ทำเสร็จไปแล้ว ทั้งที่มี checkpoint ต่อตัวเก็บไว้ใน DB อยู่แล้ว
          DAY=$(date +%u)    # 1=Mon ... 7=Sun
          HOUR=$(date +%H)   # UTC hour (GitHub Actions รัน UTC)
          echo "Day=$DAY Hour=$HOUR UTC"

          # ✅ แก้ 2026-07-02: เพิ่มเพดานบน HOUR -lt 19 (เดิมไม่มี ทำให้ self-heal ไล่ยิงทุก 10 นาที
          # ยาวไปถึง 23:59 UTC = ตี 7 เช้า Bangkok) พบว่า BUDGET_EXCEEDED โผล่มาตอนตี 3-4 ติดต่อกัน 3 วัน
          # เพราะ self-heal ยังไล่ resume ทุก 10 นาทีทั้งคืน ตอนนี้จำกัดหน้าต่างไว้แค่ 15:00-18:59 UTC
          # (22:00-01:59 Bangkok — ~4 ชม. ให้ resume พอสำหรับ checkpoint ทีละตัวที่เพิ่งแก้)
          if [ "$DAY" -le 5 ] && [ "$HOUR" -ge 15 ] && [ "$HOUR" -lt 19 ]; then
            WF_STATUS=$(curl -s --max-time 10 "${{ secrets.RENDER_URL }}/workflow/status" || echo "")
            CURRENT=$(echo "$WF_STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            echo "Workflow status: $CURRENT"

            if [ "$CURRENT" = "running" ]; then
              echo "✅ Workflow already running — nothing to do"
              exit 0
            fi

            echo "⚡ Self-heal via /workflow/resume (resume เฉพาะหุ้นค้าง, skip เองถ้าวันนี้จบแล้ว)"
            RESPONSE=$(curl -s -X POST "${{ secrets.RENDER_URL }}/workflow/resume" --max-time 60 || echo "")
            echo "Resume response: $RESPONSE"
          else
            echo "ℹ️ Outside trigger window (weekday UTC>=15 required)"
          fi

          # Step 3: Prefetch self-heal — weekday UTC 02:00-14:59 + cache stale > 70 min → trigger
          if [ "$DAY" -le 5 ] && [ "$HOUR" -ge 2 ] && [ "$HOUR" -lt 15 ]; then
            PSTATUS=$(curl -s --max-time 10 "${{ secrets.RENDER_URL }}/prefetch/status" || echo "")
            LATEST=$(echo "$PSTATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('price_cache',{}).get('latest_fetch') or '')" 2>/dev/null || echo "")
            CUTOFF=$(date -u -d '70 minutes ago' '+%Y-%m-%dT%H:%M:%S')
            echo "Last prefetch: ${LATEST:-none} | Cutoff: $CUTOFF"
            if [ -z "$LATEST" ] || [[ "$LATEST" < "$CUTOFF" ]]; then
              echo "⚡ Prefetch self-heal triggered!"
              curl -s -X POST "${{ secrets.RENDER_URL }}/prefetch" --max-time 10 || echo ""
            else
              echo "✅ Prefetch cache is fresh"
            fi
          fi
          exit 0
