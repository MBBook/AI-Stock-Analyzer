name: AI_Stocks_Prefetch

# ⛔ ปิด schedule แล้ว 2026-07-02 22:xx — ย้าย trigger ไป cron-job.org (Job B1/B2) แล้ว
# พิสูจน์แล้วเสถียรจริง เหลือ workflow_dispatch ไว้ manual backup — revert เร็วถ้าจำเป็น
on:
  # schedule:
  #   - cron: '5 2-14 * * 1-5'   # ทุกชั่วโมง นาที :05 ช่วง 02:00-14:00 UTC (09:00-21:00 Bangkok) จ-ศ
  #   - cron: '45 14 * * 1-5'    # pre-warm 14:45 UTC (21:45 Bangkok) จ-ศ ก่อน workflow หลัก 22:00
  workflow_dispatch:  # manual trigger สำหรับ test / debug

# 2026-07-02 17:33 — ไฟล์ใหม่ทั้งอัน (คนละ path จาก prefetch.yml เดิม) เพราะ prefetch.yml เดิม
# ไม่ยอมให้ GitHub ยิง schedule เองเลยแม้แต่ครั้งเดียว หลัง re-enable แล้ว 3 รอบติด (15:05, 16:05, 17:05)
# ทั้งที่ลอง manual trigger + ย้าย comment + push ใหม่เพื่อ resync ไปแล้วก็ไม่ช่วย
# สมมติฐาน: ไฟล์เดิมผ่านการเปิด-ปิด-เปิด schedule มาหลายรอบ อาจมี internal state ค้างฝั่ง GitHub
# ที่ผูกกับ path เดิม — สร้างไฟล์ใหม่คนละ path เพื่อบังคับให้ GitHub ลงทะเบียนเป็น workflow ใหม่เอี่ยม
# ไฟล์เดิม (prefetch.yml) ถูกลบไปแล้ว ห้ามสร้างซ้ำ ให้ไฟล์นี้เป็นตัวจริงตัวเดียว

jobs:
  prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wake up Render server
        run: |
          echo "⏰ Waking up Render..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.RENDER_URL }}/health")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server is awake!"
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "❌ Server failed to wake — skipping prefetch"
              exit 0  # exit 0: ไม่ fail workflow ถ้า server ไม่ตื่น
            fi
            sleep 10
          done

      - name: POST /prefetch
        run: |
          echo "📡 Triggering price pre-fetch..."
          RESPONSE=$(curl -s -X POST "${{ secrets.RENDER_URL }}/prefetch" \
            -H "Content-Type: application/json" \
            --max-time 10)
          echo "Response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "parse_error")
          echo "Prefetch status: $STATUS"
          if [ "$STATUS" = "prefetch_started" ]; then
            echo "✅ Pre-fetch triggered successfully"
          else
            echo "⚠️ Unexpected response — check Render logs"
            exit 0  # exit 0: ไม่ fail workflow เพราะ prefetch เป็น optional
          fi
