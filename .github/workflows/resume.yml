name: Workflow Resume

# ⛔ ปิด schedule แล้ว 2026-07-01 — keepalive.yml Step 2 ทำหน้าที่นี้แทนแล้ว
# (self-heal ทุก 10 นาที 15:00-23:59 UTC ยิง /workflow/resume เหมือนกัน แต่ครอบคลุมกว้างกว่า
# และถี่กว่า resume.yml เดิมที่ทำแค่ 15:15-16:45 UTC) เหลือไว้แค่ workflow_dispatch
# สำหรับกดรันมือถ้าต้องการ — กันระบบซ้ำซ้อนแบบเดียวกับที่เคยแก้ prefetch.yml
on:
  workflow_dispatch:

jobs:
  resume:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Resume stuck tickers
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.RENDER_URL }}/workflow/resume" --max-time 30)
          echo "Resume response: $RESPONSE"
